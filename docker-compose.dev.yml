services:
  traefik:
    image: traefik:v3.6
    container_name: sandcastle-traefik
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
      - "3000-3099:3000-3099"
    volumes:
      - traefik-data:/etc/traefik
      - ./.cert:/certs:ro
    networks:
      - sandcastle-web
    depends_on:
      init-traefik:
        condition: service_completed_successfully

  init-traefik:
    image: busybox
    volumes:
      - traefik-data:/data
    command:
      - sh
      - -c
      - |
        mkdir -p /data/dynamic
        if [ ! -f /data/traefik.yml ]; then
          cat > /data/traefik.yml << 'EOF'
        entryPoints:
          web:
            address: ":80"
          websecure:
            address: ":443"
        providers:
          file:
            directory: /etc/traefik/dynamic
            watch: true
        log:
          level: INFO
        EOF
          cat > /data/dynamic/rails.yml << 'EOFCONFIG'
        http:
          routers:
            rails-http:
              rule: "Host(`${DEV_HOST}`)"
              service: rails
              entryPoints:
                - web
            rails-https:
              rule: "Host(`${DEV_HOST}`)"
              service: rails
              entryPoints:
                - websecure
              tls: {}
          services:
            rails:
              loadBalancer:
                servers:
                  - url: "http://sandcastle-web:80"
        EOFCONFIG
          cat > /data/dynamic/tls.yml << 'EOFTLS'
        tls:
          stores:
            default:
              defaultCertificate:
                certFile: /certs/cert.pem
                keyFile: /certs/key.pem
          certificates:
            - certFile: /certs/cert.pem
              keyFile: /certs/key.pem
        EOFTLS
        fi
        chown -R 220568:220568 /data

  postgres:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "7633:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    environment:
      POSTGRES_USER: sandcastle
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sandcastle}
      POSTGRES_DB: sandcastle_development
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandcastle -d sandcastle_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  init-data:
    image: busybox
    volumes:
      - sandcastle-data:/data
    command: sh -c "mkdir -p /data/users /data/sandboxes && chown -R 220568:220568 /data"

  web:
    image: sandcastle:dev
    build:
      context: .
      target: development
      args:
        BUILD_VERSION: "dev"
        BUILD_GIT_SHA: ""
        BUILD_GIT_DIRTY: ""
        BUILD_DATE: ""
    container_name: sandcastle-web
    group_add:
      - "${DOCKER_GID:-0}"
    volumes:
      # Mount source code for live reloading
      - .:/rails
      # Persist gems in volume (faster than bind mount)
      - bundle-data:/usr/local/bundle
      # Persist node modules
      - node-modules:/rails/node_modules
      # Share Docker socket
      - /var/run/docker.sock:/var/run/docker.sock
      # Data directory
      - sandcastle-data:/data
      # Traefik config
      - traefik-data:/data/traefik
    networks:
      - default
      - sandcastle-web
    environment:
      RAILS_ENV: development
      PORT: 80
      BINDING: 0.0.0.0
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-deadbeef}
      SANDCASTLE_HOST: ${DEV_HOST}
      SANDCASTLE_DATA_DIR: /data
      SANDCASTLE_TLS_MODE: selfsigned
      SANDCASTLE_TLS_CERT_DIR: /certs
      SANDCASTLE_TERMINAL_URL: https://${DEV_HOST}:8443
      SANDCASTLE_VNC_URL: https://${DEV_HOST}:8443
      SANDCASTLE_TRAEFIK_CONFIG: /data/traefik/traefik.yml
      SANDCASTLE_TCP_PORT_MIN: "3000"
      SANDCASTLE_TCP_PORT_MAX: "3099"
      DB_HOST: postgres
      DB_USER: sandcastle
      DB_PASSWORD: ${DB_PASSWORD:-sandcastle}
    restart: unless-stopped
    command: ./bin/dev
    depends_on:
      init-data:
        condition: service_completed_successfully
      init-traefik:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

  worker:
    image: sandcastle:dev
    build:
      context: .
      target: development
      args:
        BUILD_VERSION: "dev"
        BUILD_GIT_SHA: ""
        BUILD_GIT_DIRTY: ""
        BUILD_DATE: ""
    container_name: sandcastle-worker
    group_add:
      - "${DOCKER_GID:-0}"
    volumes:
      # Mount source code for live reloading
      - .:/rails
      # Persist gems in volume (faster than bind mount)
      - bundle-data:/usr/local/bundle
      # Share Docker socket
      - /var/run/docker.sock:/var/run/docker.sock
      # Data directory
      - sandcastle-data:/data
      # Traefik config
      - traefik-data:/data/traefik
    networks:
      - default
      - sandcastle-web
    environment:
      RAILS_ENV: development
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-deadbeef}
      SANDCASTLE_HOST: ${DEV_HOST}
      SANDCASTLE_DATA_DIR: /data
      SANDCASTLE_TLS_MODE: selfsigned
      SANDCASTLE_TLS_CERT_DIR: /certs
      SANDCASTLE_TRAEFIK_CONFIG: /data/traefik/traefik.yml
      SANDCASTLE_TCP_PORT_MIN: "3000"
      SANDCASTLE_TCP_PORT_MAX: "3099"
      DB_HOST: postgres
      DB_USER: sandcastle
      DB_PASSWORD: ${DB_PASSWORD:-sandcastle}
    restart: unless-stopped
    command: ["bundle", "exec", "rake", "solid_queue:start"]
    depends_on:
      init-data:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

  migrate:
    image: sandcastle:dev
    build:
      context: .
      target: development
    volumes:
      - .:/rails
      - bundle-data:/usr/local/bundle
    command: ["./bin/rails", "db:prepare"]
    environment:
      RAILS_ENV: development
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-deadbeef}
      DB_HOST: postgres
      DB_USER: sandcastle
      DB_PASSWORD: ${DB_PASSWORD:-sandcastle}
      SANDCASTLE_ADMIN_USER: thies
      SANDCASTLE_ADMIN_EMAIL: thieso@gmail.com
      SANDCASTLE_ADMIN_PASSWORD: tubu
      SANDCASTLE_ADMIN_SSH_KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINZ69Do+hFr765usOHQwQG6pzLUyT4kr+uchUrAgrTqH thieso@gmail.com"
      SANDCASTLE_SKIP_PASSWORD_CHANGE: "true"
    depends_on:
      postgres:
        condition: service_healthy

networks:
  sandcastle-web:
    external: true

volumes:
  bundle-data:
  node-modules:
  pgdata:
  sandcastle-data:
  traefik-data:
